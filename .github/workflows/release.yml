name: Release

on:
  push:
    tags:
      - 'v*'

# Cancel in-progress runs on new push to the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-artifacts
            npm_config_arch: x64
            node: 20
          - os: macos-latest
            artifact_name: macos-artifacts
            npm_config_arch: arm64
            node: 20
          - os: ubuntu-latest
            artifact_name: linux-artifacts
            npm_config_arch: x64
            node: 20

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Rebuild native modules (better-sqlite3)
        run: npx @electron/rebuild -f -w better-sqlite3
        env:
          npm_config_arch: ${{ matrix.npm_config_arch }}

      - name: Linux — install FUSE
        if: runner.os == 'Linux'
        run: sudo apt-get install -y fuse libfuse2

      - name: Build packaged app
        run: npm run build
        env:
          # No code signing per D-01
          CSC_IDENTITY_AUTO_DISCOVERY: false
          SKIP_NOTARIZE: true
          # GH_TOKEN intentionally omitted: electron-builder auto-publishes when it sees
          # GH_TOKEN in CI. The aggregator publish job handles release creation instead.

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: false
          body: "## SoloCampaign ${{ github.ref_name }}\n\n**Windows:** SmartScreen may warn — click More info → Run anyway.\n\n**macOS:** Gatekeeper may warn — right-click the app → Open → Open. If you see \"app is damaged\", run: `xattr -cr /Applications/SoloCampaign.app`\n\n**Linux:** `chmod +x SoloCampaign-*.AppImage && ./SoloCampaign-*.AppImage`"
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/latest*.yml
            artifacts/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
